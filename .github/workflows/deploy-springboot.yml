name: Deploy Spring Boot to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo      # ✅ Points to demo subfolder

    steps:
      # Step 1 - Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 - Set up Java 20
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # Step 3 - Build JAR
      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      # Step 4 - Verify JAR
      - name: Verify JAR
        run: ls -lh target/

      # Step 5 - Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "demo/target/demo-0.0.1-SNAPSHOT.jar"  # ✅ Full path from repo root
          target: "/opt/springboot/"
          strip_components: 2                              # ✅ Strips demo/target/

      # Step 6 - Deploy on EC2
      - name: Deploy and Start App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop springboot || true
            sudo systemctl start springboot
            sleep 15
            sudo systemctl status springboot --no-pager
            echo "✅ Deployed Successfully!"

      # Step 7 - Health Check
      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            curl -f http://localhost:8080/actuator/health
            tail -30 /opt/springboot/logs/app.log